name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta*"
      - "v*.*.*-rc*"

permissions:
  contents: write
  id-token: write

env:
  STABLE_PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Run tests before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true # Faster subsequent runs

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.STABLE_PYTHON_VERSION }}

      - name: Install Hatch
        run: uv pip install --system hatch
      
      - name: Run tests
        run: |
          uv pip install --system -e ".[test]"
          uv run pytest tests/

      - name: Run linting (ignore errors for now)
        continue-on-error: true 
        run: uv run ruff check .

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.STABLE_PYTHON_VERSION }}
      
      - name: Build package
        run: uvx --with hatch-vcs hatch build 
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-sdist
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts directory
        run: |
          mkdir -p release-artifacts
          cp artifacts/dist-artifacts/* release-artifacts/
          ls -lh release-artifacts/

      - name: Extract release notes from tag
        id: release_notes
        run: |
          # Get tag message if it exists
          TAG_MESSAGE=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          if [ -n "$TAG_MESSAGE" ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          body: ${{ steps.release_notes.outputs.notes }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

